<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  
  </head>
  <style>
    p{
      margin: 0;
      margin-bottom: 0;
      padding: 0;
      color: blue;
    }
    div{
      margin-bottom:10px ;
    }
    img{
      width: 200px;
      height: 200px;
    }
  </style>
  <body>
    <div style="display: flex; flex-direction: column; width: 30%;">
      <label for="nome">Nome </label>
      <input type="text" id="nome" name="nome" placeholder="Digite seu nome">
      <label for="idade">Idade </label>
      <input type="number" id="idade" name="idade" placeholder="Digite sua idade">
      <label for="foto">Foto </label>
      <input type="text" id="foto" name="foto" placeholder="Digite sua URL da foto">
      <label for="cpf">Cpf </label>
      <input type="text" id="cpf" name="cpf" placeholder="Digite seu cpf">
    </div>
    <div style="display: flex; flex-direction: column; width: 30%; gap: 10px;margin-top: 15px;">
      <button id="cadastrar">Cadastrar</button>
      <button id="listar"> Listar cadastros</button>
      <button id="editar"> Editar cadastro</button>
    </div>
    <div id="lista"></div>
  </body>

  <script src="Atividade.js"></script>

</html>
