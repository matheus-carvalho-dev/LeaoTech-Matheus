<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aula 22 - Funções assíncronas</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"

  <style></style>
  <body style="margin-bottom: 500px">
    <div class="container">
      <div class="row mt-5">
        <div class="col-12">
          <h1>Faça seu cadastro</h1>
        </div>
        <div class="col-6 w-75">
          <div class="d-flex flex-column w-25 m-0">
            <label for="nome">Nome: </label>
            <input type="text" name="nome" id="nome" />
          </div>
        </div>
        <div class="col-6 w-75">
          <div class="d-flex flex-column w-25 m-0">
            <label for="idade">Idade:</label>
            <input type="text" name="idade" id="idade" />
          </div>
        </div>

        <div class="col-6 w-75">
          <div class="d-flex flex-column w-25 m-0">
            <label for="cep">CEP:<span></span></label>
            <input type="text" name="cep" id="cep" maxlength="8" />
          </div>
          <div class="d-flex flex-column w-25 m-0">
            <label for="cep">Rua:</label>
            <input type="text" name="rua" id="rua" />
          </div>
          <div class="d-flex flex-column w-25 m-0">
            <label for="cep">Complemento:</label>
            <input type="text" name="complemento" id="complemento" />
          </div>
        </div >
        <div class="col-6 w-75">
          <div class="d-flex flex-column w-25 m-0">
            <label for="cep">Cidade:</label>
            <input type="text" name="cidade" id="cidade" />
          </div>
          <div class="d-flex flex-column w-25 m-0">
            <label for="cep">Estado:</label>
            <input type="text" name="estado" id="estado" />
          </div>
          <div class="d-flex flex-column w-25 m-0">
            <label for="cep">Região:</label>
            <input type="text" name="regiao" id="regiao" />
          </div>
        </div>
      </div>
    </div>
  </body>

  <script src="script.js"></script>
<div>
  <h2></h2>

  <p></p>
  <p></p>
</div>
