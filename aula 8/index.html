<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="bg-dark vh-100 align-content-center p-5 container">
    <header class="bg-danger h-25 border border-2 border-info my-2">
      <h2>HEADER COM 12 COLUNAS</h2>
      >
    </header>
    <main class="container-fluid my-2 g-0 h-50">
      <section class="row h-100 gx-2">
        <article class="col-9 h-100">
          <div class="bg-secondary h-100 border border-2 border-info">
            ARTICLE COM 12 COLUNAS
          </div>
        </article>
        <aside class="col-3">
          <div class="bg-warning h-100 border border-2 border-info">
            ASIDE COM 12 COLUNAS
          </div>
        </aside>
      </section>
    </main>
    <footer class="bg-light h-25 my-2 border border-2 border-info">
      <h2>FOOTER COM 12 COLUNAS</h2>
    </footer>
  </body>
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"
  ></script>
</html>
