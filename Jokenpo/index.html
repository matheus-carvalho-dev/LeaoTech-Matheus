<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokenpo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="containerGeral">
    <h1>JOKEMPO</h1>
    <div class="containerMain">
            <p data-scoreboard="botName">Computador
            <span data-scoreboard="botWins">: 0</span></p>
            <p data-scoreboard="playerName">Você
            <span data-scoreboard="playerWins">: 0</span></p>
        <h2>Faça sua escolha</h2>
        <div data-choose="">
            <button value="1"><img src="./img/pedra.png" alt="pedra"></button>
            <button value="2"><img src="./img/papel.png" alt="papel"></button>
            <button value="3"><img src="./img/tesoura.png" alt="tesoura"></button>
        </div>
        <div data-escolhas="">

        <p data-escolhas="resultado"></p>
        </div>
    </div>
    </div>
</body>
<script src="script.js"></script>
</html>
